# Bitbucket Pipelines - build images + security gates (SYN-7)
# Deployment to Kubernetes was removed (no longer used).
# Local development: pnpm dev (apps/backend and apps/frontend).

image: atlassian/default-image:3

definitions:
  services:
    docker:
      memory: 2048
  steps:
    - step: &secret-scan
        name: Secret scan (gitleaks — current tree)
        image: zricethezav/gitleaks:v8.30.1
        script:
          # Full-history scan still fails until history rewrite (public-release gate).
          # CI enforces no new secrets in the current working tree.
          - gitleaks detect --source . --no-git --config .gitleaks.toml --redact --verbose --exit-code 1

pipelines:
  default:
    - step: *secret-scan

  pull-requests:
    '**':
      - step: *secret-scan

  branches:
    main:
      - step: *secret-scan
    master:
      - step: *secret-scan
    dev:
      - step: *secret-scan
      - step:
          name: Build backend image
          condition:
            changesets:
              includePaths:
                - "apps/backend/**"
          services:
            - docker
          script:
            - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD" registry.digitalocean.com
            - docker build -f apps/backend/Dockerfile -t registry.digitalocean.com/medboard-registry/api:latest .
            - docker push registry.digitalocean.com/medboard-registry/api:latest

      - step:
          size: 2x
          name: Build Frontend image
          condition:
            changesets:
              includePaths:
                - "apps/frontend/**"
          services:
            - docker
          script:
            - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD" registry.digitalocean.com
            - docker build -f apps/frontend/Dockerfile -t registry.digitalocean.com/medboard-registry/frontend:latest .
            - docker push registry.digitalocean.com/medboard-registry/frontend:latest

      # No deployment steps - project is currently local-only
