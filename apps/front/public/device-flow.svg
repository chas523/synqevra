<svg viewBox="0 60 900 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 600;
    }
  </style>
  <defs>
    <!-- gradient poruszającego się pakietu -->
    <linearGradient id="packetGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- gradient linii -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>

    <!-- STRZAŁKA -->
    <marker
      id="arrowhead"
      markerWidth="12"
      markerHeight="12"
      refX="10"
      refY="6"
      orient="auto"
      markerUnits="strokeWidth"
    >
      <path
        d="M 0 0 L 12 6 L 0 12 Z"
        fill="#06b6d4"
      />
    </marker>
  </defs>

  <!-- linia z marker-end -->
  <path
    d="M 00 100 Q 250 50, 450 100 T 895 100"
    stroke="url(#lineGradient)"
    stroke-width="2"
    fill="none"
    opacity="0.4"
    marker-end="url(#arrowhead)"
  />

  <!-- poruszający się pakiet -->
  <circle r="6" fill="url(#packetGradient)">
    <animateMotion
      dur="4s"
      repeatCount="indefinite"
      path="M 00 100 Q 250 50, 450 100 T 895 100"
    />
  </circle>

  <!-- punkty systemów -->
  <circle cx="150" cy="80" r="8" fill="#3b82f6" opacity="0.8">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="400" cy="89" r="8" fill="#06b6d4" opacity="0.8">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <circle cx="650" cy="125" r="8" fill="#27a8f9" opacity="0.8">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>

  <!-- etykiety -->
  <text x="150" y="110" text-anchor="middle" fill="#93c5fd" font-size="14">
    Thingsboard
  </text>
  <text x="400" y="115" text-anchor="middle" fill="#67e8f9" font-size="14">
    Medplum
  </text>
  <text x="650" y="150" text-anchor="middle" fill="#27a8f9" font-size="14">
    Engine
  </text>
</svg>
