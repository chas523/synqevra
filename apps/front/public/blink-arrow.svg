<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 120 100"
  width="120"
  height="100"
>
  <!-- Strzałka 1 (prawa) -->
  <path
    d="M100 20 L80 50 L100 80"
    fill="none"
    stroke="#06b6d6"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <animate
      attributeName="stroke-opacity"
values="0;1;0.1;0"
      keyTimes="0;0.25;0.5;1"
      dur="2.4s"
      repeatCount="indefinite"
      begin="0s"
    />
  </path>

  <!-- Strzałka 2 (środkowa) -->
  <path
    d="M70 20 L50 50 L70 80"
    fill="none"
    stroke="#06b6d6"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <animate
      attributeName="stroke-opacity"
    values="0;1;0.1;0"
      keyTimes="0;0.25;0.5;1"
      dur="2.4s"
      repeatCount="indefinite"
      begin="0.6s"
    />
  </path>

  <!-- Strzałka 3 (lewa) -->
  <path
    d="M40 20 L20 50 L40 80"
    fill="none"
    stroke="#06b6d6"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <animate
      attributeName="stroke-opacity"
      values="0;1;0.1;0"
      keyTimes="0;0.25;0.5;1"
      dur="2.4s"
      repeatCount="indefinite"
      begin="1.2s"
    />
  </path>
</svg>
