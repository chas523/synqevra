apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-bullmq
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-bullmq
  template:
    metadata:
      labels:
        app: redis-bullmq
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          command: ["redis-server", "--requirepass", "$(BULLMQ_PASSWORD)"]
          env:
            - name: BULLMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key:  BULLMQ_PASSWORD    
          resources:
            requests:
              memory: "64Mi"
              cpu:  "50m"
            limits:
              memory: "96Mi"
              cpu:  "75m"
            readinessProbe:
              exec:
                command: ["redis-cli", "-a", "$(BULLMQ_PASSWORD)", "ping"]
              initialDelaySeconds: 5
              periodSeconds: 5
---
apiVersion:  v1
kind:  Service
metadata:
  name: redis-bullmq
  namespace: medboard
spec:
  selector:
    app: redis-bullmq
  ports:
    - port: 6379
      targetPort: 6379