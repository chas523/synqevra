apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-backend 6379; do echo waiting for redis; sleep 2; done;']
      containers:
        - name: api
          image: registry.digitalocean.com/medboard-registry/api:1.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: medboard-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-np
  namespace: medboard
spec:
  selector:
    app: api
  type:  NodePort
  ports:
    - port: 3003
      targetPort: 3003
      nodePort: 30003