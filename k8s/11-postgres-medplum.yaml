apiVersion: apps/v1
kind: Deployment
metadata:
  name: medplum-postgres
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medplum-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: medplum-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          args:
            - "postgres"
            - "-c"
            - "listen_addresses=*"
            - "-c"
            - "statement_timeout=60000"
            - "-c"
            - "default_transaction_isolation=REPEATABLE READ"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_DB_NAME
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: [ "sh", "-c", "pg_isready" ]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: medplum-postgres-pvc
---
apiVersion:  v1
kind:  Service
metadata:
  name: medplum-postgres
  namespace: medboard
spec:
  selector:
    app: medplum-postgres
  ports:
    - port:  5432
      targetPort: 5432