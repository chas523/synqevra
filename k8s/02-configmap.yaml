apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: medboard
data:
  # Backend API
  NODE_ENV: "production"
  PORT: "3003"
  BCRYPT_ROUNDS: "8"
  FRONTEND_BASE_URL: "http://206.81.28.28:30000"
  ORIGIN_URL: "http://medplum:8103"
  # JWT
  JWT_EXPIRES_IN: "3600"
  REFRESH_JWT_EXPIRES_IN: "604800"

  # ThingsBoard (internal K8s Service address)
  THINGSBOARD_API_URL: "http://206.81.28.28:30008"
  TB_URL: "http://206.81.28.28:30008/entities/devices/"

  # Medplum (internal K8s Service address)
  MEDPLUM_URL: "http://medplum:8103"
  MEDPLUM_STORAGE_BASE_URL: "http://medplum:8103/storage/"

  # Redis (internal K8s Service address)
  REDIS_HOST: "redis-bullmq"
  REDIS_PORT: "6379"

  # Mailer
  APP_NAME: 'tb x mp'
  MAIL_PORT: '2525'
  MAIL_HOST: 'sandbox.smtp.mailtrap.io'

  # MinIO
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "public-assets"
