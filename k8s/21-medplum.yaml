apiVersion:  apps/v1
kind: Deployment
metadata:
  name: medplum
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medplum
  template:
    metadata:
      labels:
        app: medplum
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z medplum-postgres 5432 && nc -z redis-medplum 6379; do echo waiting; sleep 2; done;']
      containers:
        - name: medplum
          image: medplum/medplum-server:4.3.15
          command:
            - sh
            - -c
            - |
              echo 'Starting Medplum with environment variables.. .'
              node --require ./packages/server/dist/otel/instrumentation.js packages/server/dist/index.js env
          ports:
            - containerPort: 8103
          env:
            - name: MEDPLUM_PORT
              value: "8103"
            - name: MEDPLUM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MEDPLUM_URL
            - name: APP_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MEDPLUM_URL
            - name: MEDPLUM_STORAGE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MEDPLUM_STORAGE_BASE_URL
            - name: MEDPLUM_DATABASE_HOST
              value: "medplum-postgres"
            - name: MEDPLUM_DATABASE_PORT
              value: "5432"
            - name: MEDPLUM_DATABASE_DBNAME
              value: "medplum"
            - name: MEDPLUM_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_DB_USER
            - name: MEDPLUM_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_DB_PASSWORD
            - name: MEDPLUM_REDIS_HOST
              value: "redis-medplum"
            - name: MEDPLUM_REDIS_PORT
              value: "6379"
            - name: MEDPLUM_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_REDIS_PASSWORD
            - name: MEDPLUM_BINARY_STORAGE
              value: "file:./binary/"
            - name: MEDPLUM_SIGNING_KEY_ID
              value: "my-key-id"
            - name: MEDPLUM_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_SIGNING_KEY
            - name: MEDPLUM_SIGNING_KEY_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_SIGNING_KEY_PASSPHRASE
            - name: MEDPLUM_SUPPORT_EMAIL
              value: '\"Medplum\" <support@medplum.com>'
            - name: MEDPLUM_ADMIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key: MEDPLUM_ADMIN_CLIENT_ID
            - name:  MEDPLUM_MAX_JSON_SIZE
              value: "1mb"
            - name: MEDPLUM_MAX_BATCH_SIZE
              value: "50mb"
            - name: MEDPLUM_VM_CONTEXT_BOTS_ENABLED
              value: "true"
            - name: MEDPLUM_DEFAULT_BOT_RUNTIME_VERSION
              value: "vmcontext"
            - name: MEDPLUM_ALLOWED_ORIGINS
              value: "*"
            - name: MEDPLUM_INTROSPECTION_ENABLED
              value: "true"
            - name: MEDPLUM_SHUTDOWN_TIMEOUT_MILLISECONDS
              value: "30000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8103
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8103
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medplum
  namespace: medboard
spec:
  selector:
    app: medplum
  ports:
    - port:  8103
      targetPort: 8103