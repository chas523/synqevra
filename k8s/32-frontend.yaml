apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: registry.digitalocean.com/medboard-registry/front:1.1.1
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-np
  namespace: medboard
spec:
  selector:
    app: frontend
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
