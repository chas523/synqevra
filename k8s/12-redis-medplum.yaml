apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-medplum
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-medplum
  template:
    metadata:
      labels:
        app: redis-medplum
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort:  6379
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name:  REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medboard-secrets
                  key:  MEDPLUM_REDIS_PASSWORD
          resources:
            requests:
              memory: "8Mi"
              cpu: "10m"
            limits:
              memory: "16Mi"
              cpu: "30m"
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-medplum
  namespace: medboard
spec:
  selector:
    app: redis-medplum
  ports:
    - port: 6379
      targetPort: 6379