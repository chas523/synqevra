apiVersion: apps/v1
kind:  Deployment
metadata:
  name:  admin-app
  namespace: medboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-app
  template:
    metadata:
      labels:
        app: admin-app
    spec:
      containers:
        - name: admin-app
          image: registry.digitalocean.com/medboard-registry/admin:1.0.3
          imagePullPolicy: Always

          ports:
            - containerPort: 3002
              name: http

          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds:  15
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: admin-np
  namespace:  medboard
spec:
  selector:
    app: admin-app
  type: NodePort
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002